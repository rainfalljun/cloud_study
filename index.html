<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AWS 실기 기말시험 정리 (오픈북)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
  <meta name="description" content="AWS Lambda / S3 / DynamoDB / CloudWatch / EC2 기말 정리">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2c8eff;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .sidebar { width: 320px; }
    .markdown-section { max-width: 980px; }
    .markdown-section pre > code {
      font-size: 13px;
      line-height: 1.5;
    }
    .markdown-section code {
      border-radius: 3px;
    }
    .search input[type=search] { font-size: 15px !important; }
    .app-name-link { font-weight: 700; }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'AWS 기말 오픈북',
      repo: 'rainfalljun/cloud_study',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      maxLevel: 4,
      homepage: 'README.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 검색 (Ctrl+K)',
        noData: '결과 없음',
        depth: 6,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '복사',
        errorText: '실패',
        successText: '복사됨!'
      },
      pagination: {
        previousText: '이전',
        nextText: '다음',
        crossChapter: true,
        crossChapterText: true
      }
    };

    // Ctrl+K / Cmd+K -> focus search
    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        var el = document.querySelector('.search input[type=search]');
        if (el) { el.focus(); el.select(); }
      }
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
